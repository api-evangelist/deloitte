aid: deloitte
name: Deloitte
description: >-
  Deloitte is one of the Big Four professional services organizations,
  operating through a network of member firms coordinated by Deloitte Touche
  Tohmatsu Limited (DTTL). The organization spans approximately 150 countries
  and territories, has more than 180 years of history (founded 1845), and
  serves roughly 90% of the Fortune Global 500. Deloitte organizes delivery
  across four primary service lines — Audit & Assurance, Consulting, Tax, and
  Legal — plus specialized cross-functional practices including Business
  Process Solutions and Global Employer Services. Consulting offerings cover
  Customer, Cyber, Engineering / AI & Data, Enterprise Technology &
  Performance, Finance Transformation, Human Capital, Strategy &
  Transactions, and Risk / Regulatory & Forensic. Deloitte Digital is the
  technology-and-experience practice with alliances spanning Salesforce,
  Adobe, SAP, Google Cloud, AWS, ServiceNow, Oracle, Shopify, Sitecore, and
  Genesys, and accelerators such as FrontOffice Advantage, Revenue
  Advantage, Agentic Marketing Cloud, CreativEdge, Blueprint, Content
  Studios, and TrustID. The organization serves six industries divided into
  twenty sectors: Consumer; Energy, Resources & Industrials; Financial
  Services; Government & Public Services; Life Sciences & Health Care; and
  Technology, Media & Telecommunications. Deloitte Insights is the
  organization's research-publishing surface, organized into eight research
  centers — Cross-Industry, Economics, Consumer, Energy & Industrials,
  Financial Services, Government & Public Services, Life Sciences & Health
  Care, and Tech, Media & Telecom — producing flagship series including
  Tech Trends, Global Human Capital Trends, Digital Media Trends, TMT
  Predictions, FSI Predictions, the Weekly Global Economic Outlook, and the
  annual Industry Outlooks. The Deloitte AI Institute drives applied-AI
  research and points of view. Deloitte does not publish a public developer
  API or open developer portal at the corporate level. The Deloitte US
  Consulting GitHub organization is small (5 visible repositories, mostly
  archived upstream forks; the original artifact is `beacon`, a first-party
  web-analytics packaging library in TypeScript). Reader-facing distribution
  flows through MyDeloitte (personalized content + newsletter subscriptions),
  Dbriefs (live webcasts with CPE credit), the Deloitte Insights Magazine,
  and the YouTube channel; no public RSS index page was discoverable on
  www.deloitte.com at the path published in legacy archives.
