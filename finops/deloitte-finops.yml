description: >-
  Deloitte has no public developer API and no metered billing surface.
  Costs flow through audit, tax, legal, consulting, or managed-services
  engagement contracts and appear on client books as professional-services
  spend, not as a metered API invoice. Deloitte itself runs FinOps and
  cloud financial-management practices for clients on hyperscaler spend,
  but does not consume FinOps for its own corporate offerings.
notes: >-
  No public developer API — placeholder only. Deloitte's FinOps practice
  is an advisory offering, not a billed Deloitte API product.
